name: LLM Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Gauntlet eval run
        id: trigger
        run: |
          RESPONSE=$(curl -s -X POST https://api.gauntlet.solvexis.dev/api/v1/runs \
            -H "Authorization: Bearer ${{ secrets.GAUNTLET_JWT }}" \
            -H "Content-Type: application/json" \
            -d '{
              "test_set_id": "${{ vars.TEST_SET_ID }}",
              "rubric_id": "${{ vars.RUBRIC_ID }}",
              "providers": ["openai", "anthropic"]
            }')
          RUN_ID=$(echo $RESPONSE | jq -r '.id')
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Wait for eval completion
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.GAUNTLET_JWT }}" \
              https://api.gauntlet.solvexis.dev/api/v1/runs/${{ steps.trigger.outputs.run_id }} \
              | jq -r '.status')
            if [ "$STATUS" = "COMPLETED" ]; then break; fi
            if [ "$STATUS" = "FAILED" ]; then exit 1; fi
            sleep 10
          done

      - name: Check quality gate
        run: |
          RESULT=$(curl -s -X POST \
            https://api.gauntlet.solvexis.dev/api/v1/webhooks/ci \
            -H "X-Gauntlet-API-Key: ${{ secrets.GAUNTLET_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "run_id": "${{ steps.trigger.outputs.run_id }}",
              "min_score": 75.0
            }')
          PASSED=$(echo $RESULT | jq -r '.passed')
          echo "Quality gate result: $RESULT"
          if [ "$PASSED" != "true" ]; then
            echo "Quality gate FAILED"
            exit 1
          fi