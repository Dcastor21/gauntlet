services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gauntlet
      POSTGRES_USER: gauntlet
      POSTGRES_PASSWORD: gauntlet_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gauntlet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://gauntlet:gauntlet_local@db:5432/gauntlet
      REDIS_URL: redis://redis:6379/0
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      INTERNAL_WORKER_SECRET: local-dev-secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata: